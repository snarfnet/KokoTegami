name: KokoTegami Production Submit

on:
  workflow_dispatch:
  push:
    branches:
      - codex/kokotegami-ugc-review

concurrency:
  group: kokotegami-production
  cancel-in-progress: true

jobs:
  submit-production:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install tools
        run: |
          brew install xcodegen
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install pyjwt cryptography requests

      - name: Write App Store Connect key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          test -n "$ASC_API_KEY_CONTENT"
          mkdir -p /tmp/asc
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > /tmp/asc/AuthKey_WDXGY9WX55.p8
          cp /tmp/asc/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8
          cp /tmp/asc/AuthKey_WDXGY9WX55.p8 ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

      - name: Resolve App Store bundle ID
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          ASC_P8_PATH: /tmp/asc_key.p8
          APP_ID: "6767550479"
        run: |
          . .venv/bin/activate
          python scripts/resolve_app_bundle.py >> "$GITHUB_ENV"

      - name: Set build number
        run: |
          BUILD_NUM=$((GITHUB_RUN_NUMBER + 20))
          echo "BUILD_NUMBER=$BUILD_NUM" >> "$GITHUB_ENV"
          echo "Build number: $BUILD_NUM"

      - name: Set up GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO: ${{ secrets.GOOGLE_SERVICE_INFO }}
        run: |
          test -n "$GOOGLE_SERVICE_INFO"
          echo "$GOOGLE_SERVICE_INFO" | base64 -D > KokoTegami/GoogleService-Info.plist

      - name: Install distribution certificate
        env:
          IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$IOS_DISTRIBUTION_P12_BASE64"
          test -n "$IOS_DISTRIBUTION_P12_PASSWORD"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          printf '%s' "$IOS_DISTRIBUTION_P12_BASE64" | base64 --decode > /tmp/distribution.p12
          security import /tmp/distribution.p12 -k build.keychain -P "$IOS_DISTRIBUTION_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        run: |
          xcodebuild archive \
            -project KokoTegami.xcodeproj \
            -scheme KokoTegami \
            -destination "generic/platform=iOS" \
            -archivePath build/KokoTegami.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            PRODUCT_BUNDLE_IDENTIFIER="$APP_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export IPA
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        run: |
          xcodebuild -exportArchive \
            -archivePath build/KokoTegami.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "/tmp/asc/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload build to App Store Connect
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
        run: |
          IPA_PATH="$(find build/export -name '*.ipa' -print -quit)"
          test -n "$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Submit production review
        env:
          ASC_KEY_ID: WDXGY9WX55
          ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
          ASC_P8_PATH: /tmp/asc_key.p8
          APP_ID: "6767550479"
          APP_VERSION: "1.0"
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          . .venv/bin/activate
          python scripts/submit_production.py
