name: KokoTegami
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "8"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic
packages:
  FirebaseFirestore:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"
targets:
  KokoTegami:
    type: application
    platform: iOS
    sources:
      - path: KokoTegami
    info:
      path: KokoTegami/Info.plist
      properties:
        CFBundleDisplayName: "ここに手紙を置いてきた。"
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "8"
        LSRequiresIPhoneOS: true
        UIDeviceFamily:
          - 1
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIUserInterfaceStyle: Dark
        GADApplicationIdentifier: ca-app-pub-9404799280370656~9352372298
        NSUserTrackingUsageDescription: "より良い広告を表示するために使用します。"
        NSLocationWhenInUseUsageDescription: "近くの手紙を見つけるために位置情報を使います。"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: FirebaseFirestore
        product: FirebaseFirestore
      - package: FirebaseFirestore
        product: FirebaseAuth
      - package: GoogleMobileAds
        product: GoogleMobileAds
